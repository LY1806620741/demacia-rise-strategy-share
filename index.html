<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>德玛西亚的崛起 - 策略模拟器</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="container">
        <h1>🛡️ 德玛西亚的崛起 · 策略模拟器</h1>
        <p class="sub">官方基准 + 社区野生策略 + 点赞共识</p>

        <div class="section">
            <h2>官方英雄数据</h2>
            <div id="hero-list"></div>
        </div>

        <div class="section">
            <h2>野生策略库</h2>
            <div id="strategy-list"></div>
        </div>

        <div class="section form-box">
            <h3>发布你的战术</h3>
            <input id="title" placeholder="策略标题">
            <textarea id="desc" placeholder="战术描述"></textarea>
            <button onclick="submitStrategy()">发布到德玛西亚网络</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
