<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>德玛西亚的崛起 - 策略模拟器</title>
    <link rel="stylesheet" href="app.css">
</head>

<body>
    <div class="container">
        <h1>🛡️ 德玛西亚的崛起 · 策略模拟器</h1>
        <p class="sub">官方基准 + 社区野生策略 + 点赞共识</p>

        <div class="section status-box">
            <h2>P2P 状态仪表盘</h2>
            <div id="p2p-status" class="p2p-status">
                <div>节点数：<strong id="p2p-node-count">0</strong></div>
                <div>策略数：<strong id="p2p-data-count">0</strong></div>
                <div>网络：<strong id="p2p-network-state">离线</strong> <span id="p2p-status-light" class="status-light offline"></span></div>
            </div>
        </div>

        <!-- 本地检索 -->
        <div class="section">
            <h2>本地检索 🔎</h2>
            <input id="q" placeholder="搜索：英雄 / 建筑 / 策略（支持多关键词）">
            <div id="search-results" class="search-results">
                <div class="muted">请输入关键词进行检索</div>
            </div>
        </div>

        <div class="section">
            <h2>官方英雄数据 🌍</h2>
            <div id="hero-list"></div>
        </div>

        <div class="section">
            <h2>野生策略库 🧾</h2>
            <div id="strategy-list"></div>
        </div>

        <div class="section form-box">
            <h3>发布你的战术 📡</h3>
            <input id="title" placeholder="策略标题" />
            <select id="target">
                <option value="">选择目标敌人...</option>
            </select>
            <textarea id="desc" placeholder="战术描述"></textarea>
            
            <div class="dual-select">
                <div>
                    <label>推荐阵容（德玛西亚）</label>
                    <select id="lineup-select" multiple size="4"></select>
                </div>
                <div>
                    <label>科技应对</label>
                    <div id="tech-tree"></div>
                </div>
            </div>

            <button onclick="submitStrategy()">发布到德玛西亚网络</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
